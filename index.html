<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CPD</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
    }

    .hero {
      position: fixed;
      inset: 0;
      background: url("main.png") center center / cover no-repeat;
    }

    .email {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      padding: 10px 18px;
      color: #fff;
      background: rgba(0, 0, 0, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      font: 600 16px/1.2 Arial, sans-serif;
      letter-spacing: 0.04em;
      text-decoration: none;
      backdrop-filter: blur(6px);
      white-space: nowrap;
    }

    .email:hover {
      background: rgba(0, 0, 0, 0.8);
    }
  </style>
</head>
<body>
  <main class="hero" aria-label="Cyberpunk Division"></main>
  <a class="email" href="mailto:join@cyberpunkdivision.org">join@cyberpunkdivision.org</a>
</body>
</html>
